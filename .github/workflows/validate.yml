name: Validate RDF

on:
  push:
    paths:
      - '**.ttl'
  pull_request:
    paths:
      - '**.ttl'

jobs:
  validate-turtle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install rdflib
        run: pip install rdflib

      - name: Parse every .ttl file individually and combined
        run: |
          python3 - <<'EOF'
          import glob, sys
          import rdflib

          files = sorted(glob.glob('**/*.ttl', recursive=True))
          if not files:
              print("No .ttl files found — nothing to validate.")
              sys.exit(0)

          combined = rdflib.Graph()
          failed = False

          for f in files:
              g = rdflib.Graph()
              try:
                  g.parse(f, format='turtle')
                  combined.parse(f, format='turtle')
                  print(f"OK   {f}  ({len(g)} triples)")
              except Exception as e:
                  failed = True
                  print(f"FAIL {f}\n     {e}")

          print(f"\nCombined graph: {len(combined)} triples across {len(files)} files")

          if failed:
              sys.exit(1)
          EOF

      - name: Check every LinkNote has valid Evidence and calculatedConfidence
        run: |
          python3 - <<'EOF'
          import glob, sys
          import rdflib
          from rdflib import Namespace

          TGS = Namespace("http://example.org/tgs#")
          THINKER = Namespace("http://example.org/thinker#")
          VALID_LINKNOTE_CONFIDENCE = {
              THINKER["ConfidenceLevel.Curated"], THINKER["ConfidenceLevel.Candidate"],
              THINKER["ConfidenceLevel.Corroborated"], THINKER["ConfidenceLevel.Disputed"],
          }
          VALID_EVIDENCE_CONFIDENCE = {THINKER["ConfidenceLevel.Curated"], THINKER["ConfidenceLevel.Candidate"]}

          g = rdflib.Graph()
          for f in glob.glob('**/*.ttl', recursive=True):
              g.parse(f, format='turtle')

          errors = []

          for note in g.subjects(rdflib.RDF.type, THINKER.LinkNote):
              evidences = list(g.objects(note, THINKER.hasEvidence))
              if not evidences:
                  errors.append(f"{note} has no tgs:hasEvidence at all")

              calc = list(g.objects(note, THINKER.calculatedConfidence))
              if not calc:
                  errors.append(f"{note} missing tgs:calculatedConfidence (run scripts/compute_confidence.py)")
              else:
                  for v in calc:
                      if v not in VALID_LINKNOTE_CONFIDENCE:
                          errors.append(f"{note} has invalid calculatedConfidence: {v}")

              # a LinkNote should NOT carry the old direct tgs:confidence anymore
              if list(g.objects(note, THINKER.confidence)):
                  errors.append(f"{note} still has OLD direct tgs:confidence (should be on its Evidence instead)")

          for ev in g.subjects(rdflib.RDF.type, THINKER.Evidence):
              conf = list(g.objects(ev, THINKER.confidence))
              if not conf:
                  errors.append(f"{ev} (Evidence) missing tgs:confidence")
              else:
                  for v in conf:
                      if v not in VALID_EVIDENCE_CONFIDENCE:
                          errors.append(f"{ev} (Evidence) has invalid confidence: {v}")
              if not list(g.objects(ev, THINKER.evidencePolarity)):
                  errors.append(f"{ev} (Evidence) missing tgs:evidencePolarity")

          if errors:
              print(f"{len(errors)} problem(s) found:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print("All LinkNotes have valid Evidence and calculatedConfidence; all Evidence is well-formed.")
          EOF
